<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Rainhas - Busca Local</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Solucionador 8 Rainhas</h1>
        <p class="subtitle">Análise de Algoritmos de Busca Local</p>
        
        <div class="controls">
            <button onclick="executarHillClimbing()">Subida de Encosta (Reinício)</button>
            <button onclick="executarTemperaSimulada()">Têmpera Simulada</button>
            <button onclick="executarAlgoritmoGenetico()">Algoritmo Genético</button>
        </div>

        <div id="board" class="board"></div>

        <div class="results">
            <p><strong>Algoritmo:</strong> <span id="algoName">-</span></p>
            <p><strong>Ataques Restantes (Objetivo = 0):</strong> <span id="ataques">-</span></p>
            <p><strong>Esforço (Iterações/Gerações):</strong> <span id="iteracoes">-</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
